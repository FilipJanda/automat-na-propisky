<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleadmin.css">
 
</head>
<body>
  <div class="topbar">
    <div class="top-left">
      <h1>Admin Panel</h1>
      <span id="admin_status" class="admin-badge">ADMIN</span>
      <div id="email"></div>
    </div>
    <button onclick="location.href='dashboard.html'">← Zpět</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <button class="menu-btn active" id="menuUsers">Uživatelé</button>
      <button class="menu-btn" id="menuWifi">Wi-Fi QR</button>
    </div>
    <div class="content">
      <div id="usersPage" class="card">
        <input id="search" class="search" placeholder="Vyhledat uživatele...">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Tokeny</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
      <div id="wifiPage" class="card" style="display:none">
        <h3>Wi-Fi QR generátor</h3>
        <label>SSID</label>
        <input id="ssid">
        <label>Heslo</label>
        <input id="password">
        <button id="generate" style="margin-top:10px">Vygenerovat QR</button>
        <div id="qr" class="qr-box"></div>
      </div>
    </div>
  </div>


  <script>
    const SUPABASE_URL = "https://pgdtypgzzdchqefcgcaz.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHR5cGd6emRjaHFlZmNnY2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MjAxNzEsImV4cCI6MjA3NDA5NjE3MX0.a0VHx01HJRa6G3MGTzR3pLHRjNr1cUiaiENOwWicizc"
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    const emailEl = document.getElementById("email")
    const table = document.getElementById("userTable")
    const searchInput = document.getElementById("search")
    const adminStatusEl = document.getElementById("admin_status");
    let users = []
    let currentAdmin = null
      /* ===== OVĚŘENÍ ADMINA ===== */
    async function loadAdmin() {
      const { data: userData } = await supabaseClient.auth.getUser();
      if (!userData.user) {
        window.location.href = "index.html";
        return;
      }
      const email = userData.user.email;
      emailEl.textContent = email;
      const { data: dbUser } = await supabaseClient
        .from("users")
        .select("id, admin")
        .eq("email", email)
        .maybeSingle();
      if (!dbUser || dbUser.admin !== true) {
        alert("Nemáš oprávnění.");
        window.location.href = "dashboard.html";
        return;
      }
      currentAdmin = dbUser;
      adminStatusEl.textContent = "ADMIN";
      adminStatusEl.classList.add("admin-true");
    }
  loadAdmin();

  function renderTable(list) {
    table.innerHTML = ""
    list.forEach(user => {
      const tr = document.createElement("tr")
      tr.id = "row_" + user.id
      tr.innerHTML = `
        <td>${user.email}</td>
        <td>
          <div class="token-action">
            <span class="token-count">${user.token_count || 0}</span>
            <input type="number" min="1" id="add_${user.id}">
            <button id="btn_${user.id}" onclick="addTokens('${user.id}')">Přidat</button>
          </div>
          <div class="status-text" id="status_${user.id}"></div>
        </td>
      `
      table.appendChild(tr)
    })
  }
    /* ===== NAČTENÍ UŽIVATELŮ ===== */
  async function loadUsers() {
    const { data, error } = await supabaseClient
      .from("users")
      .select("id,email,token_count")
      .order("email")
    if (error) return
    users = data
    renderTable(data)
  }
  
  
  /* ===== PŘIDÁNÍ TOKENŮ ===== */
  async function addTokens(id) {
    if (!currentAdmin) {
      alert("Nejsi admin")
      return
    }
    const input = document.getElementById("add_" + id)
    const amount = parseInt(input.value)
    if (!amount || amount <= 0) return
    const statusEl = document.getElementById("status_" + id)
    const btnEl = document.getElementById("btn_" + id)
    const tr = document.getElementById("row_" + id)
    const tokenCountEl = tr.querySelector(".token-count")
    const { error } = await supabaseClient.rpc("add_tokens", {
		  p_id: id,
		  p_amount: amount
	  })

    if (error) {
      console.error(error)
      statusEl.textContent = "Chyba: " + error.message
      statusEl.className = "error"
      return
    }

    // Success
    btnEl.style.display = "none"
    input.value = ""
    statusEl.textContent = "Tokeny přidány"
    statusEl.className = "success"
    // Update token count in DOM
    const currentTokens = parseInt(tokenCountEl.textContent)
    tokenCountEl.textContent = currentTokens + amount
    // Update in users array
    const user = users.find(u => u.id === id)
    if (user) user.token_count = (user.token_count || 0) + amount
    // Reset after 5 seconds
    setTimeout(() => {
      btnEl.style.display = ""
      statusEl.textContent = ""
      statusEl.className = ""
    }, 5000)
  }

  loadUsers()

    /* ===== SEARCH ===== */
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase()
    const filtered = users.filter(u =>
      u.email.toLowerCase().includes(q)
    )
    renderTable(filtered)
  })
  /* ===== MENU SWITCH ===== */
  const usersPage = document.getElementById("usersPage")
  const wifiPage = document.getElementById("wifiPage")
  document.getElementById("menuUsers").onclick = () => {
    usersPage.style.display = "block"
    wifiPage.style.display = "none"
    document.getElementById("menuUsers").classList.add("active")
    document.getElementById("menuWifi").classList.remove("active")
  }
  document.getElementById("menuWifi").onclick = () => {
    usersPage.style.display = "none"
    wifiPage.style.display = "block"
    document.getElementById("menuWifi").classList.add("active")
    document.getElementById("menuUsers").classList.remove("active")
  }
  /* ===== WIFI QR ===== */
  document.getElementById("generate").onclick = () => {
    const ssid = document.getElementById("ssid").value
    const pass = document.getElementById("password").value
    const qrData = ssid + "/" + pass
    document.getElementById("qr").innerHTML = ""
    QRCode.toCanvas(qrData, { width: 220 }, (err, canvas) => {
      document.getElementById("qr").appendChild(canvas)
    })
  }
  </script>
  
</body>
</html>
