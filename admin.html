<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #dbeafe);
      color: #1e293b;
    }
    /* TOPBAR */
    .topbar {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
    }
    .top-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .topbar h1 {
      margin: 0;
      color: #2563eb;
      font-size: 1.4rem;
    }
    .admin-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: #fee2e2;
      color: #dc2626;
    }
    .topbar button {
      background: #e5e7eb;
      border: none;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
    }
    /* LAYOUT */
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .menu-btn {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #f1f5f9;
      cursor: pointer;
      text-align: left;
      font-weight: 500;
    }
    .menu-btn.active {
      background: #2563eb;
      color: white;
    }
    /* CONTENT */
    .content {
      flex: 1;
      padding: 20px;
    }
    /* CARD */
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th,
    td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      font-size: .85rem;
      color: #64748b;
    }
    td input {
      width: 80px;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #cbd5f5;
    }
    td button {
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
    /* SEARCH */
    .search {
      margin-bottom: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #cbd5f5;
    }
    /* WIFI */
    #wifiPage label,
    #wifiPage input,
    #wifiPage button,
    #wifiPage .qr-box {
      display: block;
      width: 100%;
      margin-top: 12px;
    }
    #wifiPage label {
      margin-top: 16px;
      font-weight: 600;
    }
    #wifiPage input {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5f5;
      font-size: 1rem;
      box-sizing: border-box;
    }
    #wifiPage button {
      max-width: 240px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .qr-box {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    /* MOBILE */
    @media (max-width: 800px) {
      .layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow: auto;
      }
      .menu-btn {
        flex: 1;
        text-align: center;
      }
      .content {
        padding: 10px;
      }
      .card {
        padding: 14px;
      }
      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }
      tr {
        margin-bottom: 12px;
      }
      th {
        display: none;
      }
      td {
        padding: 8px;
        border: none;
      }
      td:not(:last-child) {
        border-bottom: 1px solid #e2e8f0;
      }
      td input,
      td button {
        width: 100%;
        margin-top: 6px;
      }
      td:nth-child(1)::before { content: "Email: "; font-weight: 600; }
      td:nth-child(2)::before { content: "Tokeny: "; font-weight: 600; }
      td:nth-child(3)::before { content: "Přidat: "; font-weight: 600; }
      td:nth-child(4)::before { content: "Akce: "; font-weight: 600; }
      td:nth-child(5)::before { content: "Status: "; font-weight: 600; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="top-left">
      <h1>Admin Panel</h1>
      <span id="admin_status" class="admin-badge">ADMIN</span>
      <div id="email"></div>
    </div>
    <button onclick="location.href='dashboard.html'">← Zpět</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <button class="menu-btn active" id="menuUsers">Uživatelé</button>
      <button class="menu-btn" id="menuWifi">Wi-Fi QR</button>
    </div>
    <div class="content">
      <div id="usersPage" class="card">
        <input id="search" class="search" placeholder="Vyhledat uživatele...">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Tokeny</th>
              <th>Přidat</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
      <div id="wifiPage" class="card" style="display:none">
        <h3>Wi-Fi QR generátor</h3>
        <label>SSID</label>
        <input id="ssid">
        <label>Heslo</label>
        <input id="password">
        <button id="generate" style="margin-top:10px">Vygenerovat QR</button>
        <div id="qr" class="qr-box"></div>
      </div>
    </div>
  </div>
  <script>
    const SUPABASE_URL = "https://pgdtypgzzdchqefcgcaz.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHR5cGd6emRjaHFlZmNnY2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1MjAxNzEsImV4cCI6MjA3NDA5NjE3MX0.a0VHx01HJRa6G3MGTzR3pLHRjNr1cUiaiENOwWicizc"
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    const emailEl = document.getElementById("email")
    const table = document.getElementById("userTable")
    const searchInput = document.getElementById("search")
    const adminStatusEl = document.getElementById("admin_status");
    let users = []
    let currentAdmin = null
      /* ===== OVĚŘENÍ ADMINA ===== */
    async function loadAdmin() {
      const { data: userData } = await supabaseClient.auth.getUser();
      if (!userData.user) {
        window.location.href = "index.html";
        return;
      }
      const email = userData.user.email;
      emailEl.textContent = email;
      const { data: dbUser } = await supabaseClient
        .from("users")
        .select("id, admin")
        .eq("email", email)
        .maybeSingle();
      if (!dbUser || dbUser.admin !== true) {
        alert("Nemáš oprávnění.");
        window.location.href = "dashboard.html";
        return;
      }
      currentAdmin = dbUser;
      adminStatusEl.textContent = "ADMIN";
      adminStatusEl.classList.add("admin-true");
    }
  loadAdmin();

  function renderTable(list) {
    table.innerHTML = ""
    list.forEach(user => {
      const tr = document.createElement("tr")
      tr.id = "row_" + user.id
      tr.innerHTML = `
        <td>${user.email}</td>
        <td>${user.token_count || 0}</td>
        <td>
          <input type="number" min="1" id="add_${user.id}">
        </td>
        <td>
          <button id="btn_${user.id}" onclick="addTokens('${user.id}')">Přidat</button>
        </td>
        <td id="status_${user.id}"></td>
      `
      table.appendChild(tr)
  
    })
  }
    /* ===== NAČTENÍ UŽIVATELŮ ===== */
  async function loadUsers() {
    const { data, error } = await supabaseClient
      .from("users")
      .select("id,email,token_count")
      .order("email")
    if (error) return
    users = data
    renderTable(data)
  }
  
  
  /* ===== PŘIDÁNÍ TOKENŮ ===== */
  async function addTokens(id) {
    if (!currentAdmin) {
      alert("Nejsi admin")
      return
    }
    const input = document.getElementById("add_" + id)
    const amount = parseInt(input.value)
    if (!amount || amount <= 0) return
    const statusEl = document.getElementById("status_" + id)
    const btnEl = document.getElementById("btn_" + id)
    const tr = document.getElementById("row_" + id)
    const tokenTd = tr.children[1]
    const { error } = await supabaseClient.rpc("add_tokens", {
		  p_id: id,
		  p_amount: amount
	  })

    if (error) {
      console.error(error)
      statusEl.textContent = "Chyba: " + error.message
      statusEl.className = "error"
      return
    }

    // Success
    btnEl.style.display = "none"
    input.value = ""
    statusEl.textContent = "Tokeny přidány"
    statusEl.className = "success"
    // Update token count in DOM
    const currentTokens = parseInt(tokenTd.textContent)
    tokenTd.textContent = currentTokens + amount
    // Update in users array
    const user = users.find(u => u.id === id)
    if (user) user.token_count = (user.token_count || 0) + amount
    // Reset after 5 seconds
    setTimeout(() => {
      btnEl.style.display = ""
      statusEl.textContent = ""
      statusEl.className = ""
    }, 5000)
  }

  loadUsers()

    /* ===== SEARCH ===== */
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase()
    const filtered = users.filter(u =>
      u.email.toLowerCase().includes(q)
    )
    renderTable(filtered)
  })
  /* ===== MENU SWITCH ===== */
  const usersPage = document.getElementById("usersPage")
  const wifiPage = document.getElementById("wifiPage")
  document.getElementById("menuUsers").onclick = () => {
    usersPage.style.display = "block"
    wifiPage.style.display = "none"
    document.getElementById("menuUsers").classList.add("active")
    document.getElementById("menuWifi").classList.remove("active")
  }
  document.getElementById("menuWifi").onclick = () => {
    usersPage.style.display = "none"
    wifiPage.style.display = "block"
    document.getElementById("menuWifi").classList.add("active")
    document.getElementById("menuUsers").classList.remove("active")
  }
  /* ===== WIFI QR ===== */
  document.getElementById("generate").onclick = () => {
    const ssid = document.getElementById("ssid").value
    const pass = document.getElementById("password").value
    const qrData = ssid + "/" + pass
    document.getElementById("qr").innerHTML = ""
    QRCode.toCanvas(qrData, { width: 220 }, (err, canvas) => {
      document.getElementById("qr").appendChild(canvas)
    })
  }
  </script>
</body>
</html>
